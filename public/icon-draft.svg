<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Rounded square background, Apple Blue -->
  <rect width="1024" height="1024" rx="230" fill="#0071e3"/>

  <!-- Three chat bubbles flowing right → left -->

  <!-- Leading bubble (right side, largest, opaque) -->
  <g transform="translate(560, 420)">
    <rect x="0" y="0" width="360" height="220" rx="100" fill="#ffffff"/>
    <!-- Small tail pointing down-right -->
    <path d="M 250 220 Q 270 260 310 260 Q 270 240 260 215 Z" fill="#ffffff"/>
  </g>

  <!-- Middle bubble (center, medium, lightly faded) -->
  <g transform="translate(280, 340)" opacity="0.7">
    <rect x="0" y="0" width="260" height="170" rx="80" fill="#ffffff"/>
  </g>

  <!-- Trailing bubble (left side, smallest, heavily faded) -->
  <g transform="translate(100, 600)" opacity="0.42">
    <rect x="0" y="0" width="180" height="120" rx="55" fill="#ffffff"/>
  </g>
</svg>
